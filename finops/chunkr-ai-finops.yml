description: >-
  FinOps view of Chunkr Cloud spend. Chunkr bills a monthly subscription per
  tier that bundles a credit and included-page allowance, then charges a
  declining per-page overage rate (roughly $0.005-$0.01/page depending on tier).
  Cost scales with pages processed across parse and extract tasks. A self-hosted
  AGPL-3.0 build shifts spend from per-page fees to infrastructure (compute, GPU)
  costs.
notes: >-
  Per-page rates and allowances are subject to change; verify against the
  Chunkr pricing page during reconciliation. Self-hosting trades per-page Cloud
  fees for owned infrastructure cost.
sources:
- https://chunkr.ai/pricing
- https://docs.chunkr.ai/pages/get-started/welcome
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Chunkr
serviceCategory: AI and Machine Learning
billingModel:
  pricingCategory: Subscription-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Chunkr Cloud
  ServiceCategory: AI and Machine Learning
  ProviderName: Chunkr
  PublisherName: Chunkr
  InvoiceIssuerName: Chunkr
  BillingCurrency: USD
