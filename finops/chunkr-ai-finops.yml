meters:
- name: pages_processed
  description: Document pages processed by parse and extract tasks, the primary cost driver, billed per page after the included allowance.
  unit: pages
  aggregation: sum
  dimensions:
  - account
  - task_type
  - plan
- name: credits_consumed
  description: Credits drawn down from the monthly allowance, roughly one credit per processed page.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - plan
- name: subscription_fee
  description: Fixed monthly subscription fee per tier (Starter, Dev, Growth).
  unit: months
  aggregation: sum
  dimensions:
  - account
  - plan
- name: included_pages
  description: Pages covered by the monthly bundled allowance before overage applies.
  unit: pages
  aggregation: sum
  dimensions:
  - account
  - plan
- name: overage_pages
  description: Pages processed beyond the included allowance, billed at the tier per-page rate.
  unit: pages
  aggregation: sum
  dimensions:
  - account
  - plan
- name: self_hosted_compute
  description: Infrastructure (compute / GPU) cost when running the AGPL-3.0 self-hosted deployment instead of Cloud.
  unit: hours
  aggregation: sum
  dimensions:
  - account
  - deployment
principles:
- name: Visibility
  description: Track pages processed per task type and per project key; reconcile against the monthly allowance and overage.
- name: Allocation
  description: Tag tasks and API keys per workload/team; map page consumption to internal cost centers.
- name: Optimization
  description: Right-size the subscription tier to expected page volume to capture the lower per-page rate; tune chunk_processing and ocr_strategy to avoid reprocessing; consider self-hosting for very high volume.
- name: Accountability
  description: Assign owners per project/key; review page burn and overage monthly against budget.
